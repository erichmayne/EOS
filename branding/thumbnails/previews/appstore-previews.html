<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EOS — App Store Preview Screenshots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8e8e8;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 32px;
      padding: 40px;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    .preview {
      width: 430px;
      height: 932px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .preview:hover { transform: scale(1.01); }

    .headline {
      padding: 72px 36px 0;
      font-size: 38px;
      font-weight: 800;
      text-align: center;
      background: linear-gradient(135deg, #C49200 0%, #D9A600 30%, #F2BF1A 60%, #D9A600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      flex-shrink: 0;
    }

    .spacer {
      flex: 1;
      min-height: 24px;
      max-height: 48px;
    }

    .screen-wrapper {
      width: 370px;
      height: 740px;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
      margin-bottom: 36px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      border: 2px solid rgba(0,0,0,0.1);
    }

    .screen-wrapper img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 112%;
      height: 106%;
      object-fit: cover;
    }

    .screen-wrapper.objective-screen img {
      transform: translate(-50%, -47%);
    }

    .email-patch {
      position: absolute;
      z-index: 2;
      background: #fdf4d8;
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #444;
      padding: 3px 4px;
      line-height: 1.2;
      white-space: nowrap;
    }

    /* ── Isolated export mode ── */
    .preview.isolated {
      position: fixed;
      top: 0; left: 0;
      width: 1290px;
      height: 2796px;
      z-index: 100;
      transform: none !important;
      box-shadow: none;
    }

    .preview.isolated .headline {
      padding: 220px 100px 0;
      font-size: 128px;
    }

    .preview.isolated .spacer {
      min-height: 60px;
      max-height: 140px;
    }

    .preview.isolated .screen-wrapper {
      width: 1100px;
      height: 2160px;
      border-radius: 125px;
      margin-bottom: 100px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.08);
      border-width: 6px;
    }

    .preview.isolated .email-patch {
      font-size: 40px;
      padding: 6px 18px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
    }

    .overlay.active { display: block; }

    .export-hint {
      text-align: center;
      color: #999;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <!-- Preview 1: Home Screen -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Set it. Do it.<br>Or lose it.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="home.png" alt="Home screen">
    </div>
  </div>

  <!-- Preview 2: Stakes -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Put real money<br>on the line.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="stakes.png" alt="Stakes screen">
    </div>
  </div>

  <!-- Preview 3: Objectives -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Your goals.<br>Your rules.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper objective-screen">
      <img src="objective.png" alt="Objective settings">
    </div>
  </div>

  <!-- Preview 4: Competition -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Compete<br>and win.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="compete.png" alt="Competition lobby">
    </div>
  </div>

  <!-- Preview 5: Strava -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Your runs, tracked<br>automatically.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="strava.png" alt="Strava integration">
    </div>
  </div>

  <!-- Preview 6: Compete -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Challenge<br>your friends.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="comp.png" alt="Competition screen">
    </div>
  </div>

  <!-- Preview 7: Pushups -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">AI Pushup<br>Tracking.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="pushups.png" alt="Pushup session">
    </div>
  </div>

  <!-- Preview 8: Welcome -->
  <div class="preview" onclick="toggleIsolate(this)">
    <div class="headline">Compete or build<br>better habits.</div>
    <div class="spacer"></div>
    <div class="screen-wrapper">
      <img src="habits.png" alt="Welcome screen">
    </div>
  </div>

  <div class="export-hint">Click any preview to isolate at 1290×2796 for export</div>

  <script>
    const overlay = document.getElementById('overlay');

    function toggleIsolate(el) {
      const isIsolated = el.classList.contains('isolated');
      document.querySelectorAll('.preview').forEach(p => p.classList.remove('isolated'));
      overlay.classList.remove('active');

      if (!isIsolated) {
        el.classList.add('isolated');
        overlay.classList.add('active');
      }
    }

    overlay.addEventListener('click', () => {
      document.querySelectorAll('.preview').forEach(p => p.classList.remove('isolated'));
      overlay.classList.remove('active');
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.preview').forEach(p => p.classList.remove('isolated'));
        overlay.classList.remove('active');
      }
    });
  </script>
</body>
</html>
